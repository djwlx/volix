# 利用GitHub Action自动构建多框架的docker镜像
name: Build Docker Image

on:
  push:
    tags:
      - 'v*'

  pull_request:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/iron

      - name: Update version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=${TAG#v}
          echo "Setting package versions to $VERSION"
          node scripts/update-versions.js "$VERSION"

      - name: Generate AI Release Summary
        env:
          TAG: ${{ github.ref_name }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/release-ai-summary.cjs \
            --tag "$TAG" \
            --changelog CHANGELOG.md \
            --release-notes release-notes.md

      - name: Build Source
        run: |
          npm run release

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/volix
          short-description: Volix

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/volix:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/volix:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/volix:latest
            ghcr.io/${{ github.repository_owner }}/volix:${{ github.ref_name }}

      - name: Compress dist folder
        run: |
          cd dist
          zip -r ../app.zip .
          cd ..

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: app.zip
          prerelease: false

      - name: commit change
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          rm -f release-notes.md
          git add .
          git restore --staged app.zip || true
          if ! git diff --cached --quiet; then
            git commit -m "ci: update version" -n
            git push
          else
            echo "No changes to commit."
          fi
